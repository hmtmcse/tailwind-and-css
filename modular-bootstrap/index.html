<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pnpm Modular Bootstrap</title>
  <link rel="stylesheet" href="./src/scss/accordion.scss">
</head>
<body>

  <div class="container mt-5">
    <div class="accordion" id="pnpmAccordion">
      <div class="accordion-item">
        <h2 class="accordion-header">
          <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne">
            Pnpm + Vite + Bootstrap
          </button>
        </h2>
        <div id="collapseOne" class="accordion-collapse collapse show">
          <div class="accordion-body">
            This accordion only loads its own CSS and JS!
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./src/js/accordion.js"></script>
</body>
</html>
